<script>
/* =========================================================
   STORAGE + GLOBALS
========================================================= */
const FINAL_WORD = "CARAIBI";
const STORAGE_UNLOCKED = "unlocked_letters";
const STORAGE_ANAGRAM = "anagram_state";
const STORAGE_GAME_DONE = "games_done";
const STORAGE_CURRENT_GAME = "current_game";

function safeParseJSON(raw, fallback){
  try{
    const x = JSON.parse(raw);
    return (x === null || x === undefined) ? fallback : x;
  }catch{
    return fallback;
  }
}

function getUnlocked(){
  const raw = localStorage.getItem(STORAGE_UNLOCKED);
  const arr = safeParseJSON(raw, []);
  return Array.isArray(arr) ? arr.map(x => String(x).toUpperCase()) : [];
}

function updateUnlockedChip(){
  const cur = getUnlocked();
  unlockedChipEl.textContent = `Lettere sbloccate: ${cur.length} / ${FINAL_WORD.length}`;
}

function setUnlocked(arr){
  const unique = Array.from(new Set(arr.map(x => String(x).toUpperCase())));
  localStorage.setItem(STORAGE_UNLOCKED, JSON.stringify(unique));
  updateUnlockedChip();
}

function unlockLetters(letters){
  const cur = getUnlocked();
  let changed = false;
  for(const L of letters){
    const u = String(L).toUpperCase();
    if(!cur.includes(u)){
      cur.push(u);
      changed = true;
    }
  }
  if(changed) setUnlocked(cur);
}

function getGamesDone(){
  const raw = localStorage.getItem(STORAGE_GAME_DONE);
  const obj = safeParseJSON(raw, {});
  return (obj && typeof obj === "object") ? obj : {};
}

// FIX: quando segni un gioco come completato aggiorna subito gli step (sblocco immediato)
function setGameDone(gameId){
  const obj = getGamesDone();
  if(!obj[gameId]){
    obj[gameId] = true;
    localStorage.setItem(STORAGE_GAME_DONE, JSON.stringify(obj));
  }
  renderSteps();
}

/* =========================================================
   ANAGRAM WIDGET (always visible)
========================================================= */
const anaSlotsEl = document.getElementById("anaSlots");
const anaPoolEl  = document.getElementById("anaPool");
const anaMsgEl   = document.getElementById("anaMsg");
const unlockedChipEl = document.getElementById("unlockedChip");

let anaSlots = Array(FINAL_WORD.length).fill(null);

function loadAnagram(){
  const raw = localStorage.getItem(STORAGE_ANAGRAM);
  const obj = safeParseJSON(raw, null);
  if(obj && Array.isArray(obj.slots) && obj.slots.length === FINAL_WORD.length){
    anaSlots = obj.slots.map(x => x ? String(x).toUpperCase() : null);
  }
}

function saveAnagram(){
  localStorage.setItem(STORAGE_ANAGRAM, JSON.stringify({ slots: anaSlots }));
}

function computeAnaPool(){
  const unlocked = getUnlocked();
  const placed = anaSlots.filter(Boolean);
  const pool = unlocked.slice();
  for(const p of placed){
    const idx = pool.indexOf(p);
    if(idx >= 0) pool.splice(idx, 1);
  }
  return pool;
}

function renderAnagram(){
  updateUnlockedChip();
  anaMsgEl.textContent = "";
  anaMsgEl.className = "msg";

  // slots
  anaSlotsEl.innerHTML = "";
  for(let i=0; i<FINAL_WORD.length; i++){
    const slot = document.createElement("div");
    slot.className = "slot " + (anaSlots[i] ? "filled" : "empty");
    slot.dataset.idx = i;
    if(anaSlots[i]) slot.textContent = anaSlots[i];

    // tap to remove from slot
    slot.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      if(!anaSlots[i]) return;
      anaSlots[i] = null;
      saveAnagram();
      renderAnagram();
    });

    anaSlotsEl.appendChild(slot);
  }

  // pool
  const pool = computeAnaPool();
  anaPoolEl.innerHTML = "";
  pool.forEach((ch) => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = ch;
    tile.addEventListener("pointerdown", (e) => startAnaDrag(e, ch));
    anaPoolEl.appendChild(tile);
  });
}

let anaDragging = null;
function startAnaDrag(e, letter){
  e.preventDefault();
  anaDragging = { letter };
  window.addEventListener("pointerup", endAnaDrag, { once:true });
}
function endAnaDrag(e){
  if(!anaDragging) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const slot = el?.classList?.contains("slot") ? el : el?.closest?.(".slot");
  if(slot){
    const idx = parseInt(slot.dataset.idx, 10);
    if(!anaSlots[idx]){
      anaSlots[idx] = anaDragging.letter;
      saveAnagram();
    }
  }
  anaDragging = null;
  renderAnagram();
}

document.getElementById("anaResetBtn").addEventListener("click", () => {
  anaSlots = Array(FINAL_WORD.length).fill(null);
  saveAnagram();
  renderAnagram();
});

document.getElementById("anaCheckBtn").addEventListener("click", () => {
  const unlocked = getUnlocked();
  if(unlocked.length < FINAL_WORD.length){
    anaMsgEl.textContent = "Non puoi completarlo: ti mancano ancora delle lettere sbloccate.";
    anaMsgEl.className = "msg bad";
    return;
  }
  if(anaSlots.some(x => !x)){
    anaMsgEl.textContent = "Completa tutti gli spazi prima di controllare.";
    anaMsgEl.className = "msg bad";
    return;
  }
  const guess = anaSlots.join("");
  if(guess === FINAL_WORD){
    anaMsgEl.textContent = "✅ Anagramma completato!";
    anaMsgEl.className = "msg ok";
  }else{
    anaMsgEl.textContent = "❌ Non è corretto. Riprova.";
    anaMsgEl.className = "msg bad";
  }
});

/* =========================================================
   NAVIGATION (solo step tondi) — FIX: rimosso prev/next inesistenti
========================================================= */
const games = ["game1", "game2", "game3"];
let currentGameIndex = 0;

function canAccess(index){
  const done = getGamesDone();
  if(index === 0) return true;
  if(index === 1) return !!done.game1;
  if(index === 2) return !!done.game2;
  return false;
}

function renderSteps(){
  const nav = document.getElementById("stepNav");
  nav.innerHTML = "";

  const done = getGamesDone();

  games.forEach((g, i) => {
    const step = document.createElement("div");
    step.className = "step";
    step.textContent = String(i + 1);

    if(i === currentGameIndex) step.classList.add("active");
    if(done[g]) step.classList.add("done");

    if(!canAccess(i)){
      step.classList.add("locked");
    }else{
      step.addEventListener("click", () => {
        currentGameIndex = i;
        showGame();
      });
    }

    nav.appendChild(step);
  });
}

function showGame(){
  games.forEach((g,i)=>{
    document.getElementById(g).classList.toggle("hidden", i !== currentGameIndex);
  });

  localStorage.setItem(STORAGE_CURRENT_GAME, games[currentGameIndex]);
  renderSteps();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// FIX: unica versione, niente duplicati
function restoreCurrentGame(){
  const saved = localStorage.getItem(STORAGE_CURRENT_GAME);
  const idx = games.indexOf(saved);
  currentGameIndex = (idx >= 0 && canAccess(idx)) ? idx : 0;
  showGame();
}

/* =========================================================
   GAME 1: CROSSWORD (reward unlock "C")
========================================================= */
const cwGridEl = document.getElementById("cwGrid");
const cwAcrossEl = document.getElementById("cwAcrossClues");
const cwDownEl = document.getElementById("cwDownClues");
const cwProgressEl = document.getElementById("cwProgress");
const cwBanner = document.getElementById("cwBanner");

const CW_GRID = [
  "##EMPIRICO###",
  "######O######",
  "####SEMANTICA",
  "######A#####N",
  "ETICA#N#####A",
  "##P###T#S#C#L",
  "##ESPLICITO#O",
  "##R###C#N#E#G",
  "##B###O#T#R#I",
  "##O#####A#E#A",
  "##L#####S#N##",
  "##E#####S#Z##",
  "####CRITICA##"
];
const CW_N = 13;

const CW_NUM_MAP = new Map([
  ["0,2","1"], ["0,6","2"], ["2,4","3"], ["2,12","4"], ["4,0","5"],
  ["4,2","6"], ["5,8","7"], ["5,10","8"], ["6,2","9"], ["12,4","10"]
]);

const CW_WORDS = [
  { num:1, dir:"A", answer:"EMPIRICO", clue:"Basato sull’esperienza e sull’osservazione.", start:[0,2] },
  { num:3, dir:"A", answer:"SEMANTICA", clue:"Ramo della linguistica che studia il significato.", start:[2,4] },
  { num:5, dir:"A", answer:"ETICA", clue:"Disciplina che riflette su principi e comportamenti morali.", start:[4,0] },
  { num:9, dir:"A", answer:"ESPLICITO", clue:"Detto in modo chiaro, non sottinteso (opposto di implicito).", start:[6,2] },
  { num:10, dir:"A", answer:"CRITICA", clue:"Capacità di valutare con giudizio, analizzando pro e contro.", start:[12,4] },
  { num:2, dir:"D", answer:"ROMANTICO", clue:"Relativo al Romanticismo, corrente culturale dell’Ottocento.", start:[0,6] },
  { num:4, dir:"D", answer:"ANALOGIA", clue:"Rapporto di somiglianza tra elementi; procedimento per confronto.", start:[2,12] },
  { num:6, dir:"D", answer:"IPERBOLE", clue:"Figura retorica che consiste nell’esagerazione.", start:[4,2] },
  { num:7, dir:"D", answer:"SINTASSI", clue:"Parte della grammatica che studia la struttura della frase.", start:[5,8] },
  { num:8, dir:"D", answer:"COERENZA", clue:"Qualità di ciò che è logico e non contraddittorio.", start:[5,10] }
];
const CW_TOTAL = CW_WORDS.length;
const cwFound = new Set();

function cwSetResponsiveCellSize(){
  const padding = 40;
  const maxWidth = Math.min(window.innerWidth, 640) - padding;
  const gap = 3;
  const cell = Math.floor((maxWidth - gap*(CW_N-1)) / CW_N);
  const clamped = Math.max(22, Math.min(cell, 40));
  document.documentElement.style.setProperty("--cell", clamped + "px");
  document.documentElement.style.setProperty("--gap", gap + "px");
  cwGridEl.style.gridTemplateColumns = `repeat(${CW_N}, var(--cell))`;
}
window.addEventListener("resize", cwSetResponsiveCellSize);

function cwWordCells(w){
  const [sr,sc] = w.start;
  const dr = (w.dir==="D") ? 1 : 0;
  const dc = (w.dir==="A") ? 1 : 0;
  const cells = [];
  for(let i=0;i<w.answer.length;i++) cells.push([sr + dr*i, sc + dc*i]);
  return cells;
}
function cwIsBlock(r,c){ return r<0 || c<0 || r>=CW_N || c>=CW_N || CW_GRID[r][c]==="#"; }
function cwGetInput(r,c){ return document.querySelector(`#cwGrid input[data-r='${r}'][data-c='${c}']`); }

function cwFocusNext(r,c){
  for(let cc=c+1; cc<CW_N; cc++) if(!cwIsBlock(r,cc)){ cwGetInput(r,cc)?.focus(); return; }
  for(let rr=r+1; rr<CW_N; rr++) for(let cc=0; cc<CW_N; cc++) if(!cwIsBlock(rr,cc)){ cwGetInput(rr,cc)?.focus(); return; }
}
function cwFocusPrev(r,c){
  for(let cc=c-1; cc>=0; cc--) if(!cwIsBlock(r,cc)){ cwGetInput(r,cc)?.focus(); return; }
  for(let rr=r-1; rr>=0; rr--) for(let cc=CW_N-1; cc>=0; cc--) if(!cwIsBlock(rr,cc)){ cwGetInput(rr,cc)?.focus(); return; }
}

function cwClearActive(){ document.querySelectorAll("#cwGrid .cwCell.active").forEach(el => el.classList.remove("active")); }
function cwCellKey(r,c){ return `${r},${c}`; }

function cwHighlightActive(r,c){
  cwClearActive();
  const k = cwCellKey(r,c);
  for(const w of CW_WORDS){
    const cells = cwWordCells(w);
    if(cells.some(([rr,cc]) => cwCellKey(rr,cc)===k)){
      for(const [rr,cc] of cells){
        const cellEl = document.querySelector(`#cwGrid .cwCell[data-r='${rr}'][data-c='${cc}']`);
        if(cellEl) cellEl.classList.add("active");
      }
    }
  }
}

function cwReadWord(w){
  const cells = cwWordCells(w);
  let s="";
  for(const [r,c] of cells) s += (cwGetInput(r,c)?.value || "");
  return s.toUpperCase();
}

function cwSetWordCorrect(w, ok){
  for(const [r,c] of cwWordCells(w)){
    const cellEl = document.querySelector(`#cwGrid .cwCell[data-r='${r}'][data-c='${c}']`);
    if(cellEl) cellEl.classList.toggle("correct", ok);
  }
}

function cwBuildClues(){
  cwAcrossEl.innerHTML = "";
  cwDownEl.innerHTML = "";
  const across = CW_WORDS.filter(w=>w.dir==="A").sort((a,b)=>a.num-b.num);
  const down = CW_WORDS.filter(w=>w.dir==="D").sort((a,b)=>a.num-b.num);

  for(const w of across){
    const div = document.createElement("div");
    div.className = "clue";
    div.innerHTML = `<b>${w.num}.</b> ${w.clue}`;
    cwAcrossEl.appendChild(div);
  }
  for(const w of down){
    const div = document.createElement("div");
    div.className = "clue";
    div.innerHTML = `<b>${w.num}.</b> ${w.clue}`;
    cwDownEl.appendChild(div);
  }
}

function cwBuildGrid(){
  cwGridEl.innerHTML = "";
  for(let r=0;r<CW_N;r++){
    for(let c=0;c<CW_N;c++){
      const ch = CW_GRID[r][c];
      const cell = document.createElement("div");
      cell.className = "cwCell";
      cell.dataset.r = r;
      cell.dataset.c = c;

      if(ch === "#"){
        cell.classList.add("block");
        cwGridEl.appendChild(cell);
        continue;
      }

      const num = CW_NUM_MAP.get(`${r},${c}`);
      if(num){
        const n = document.createElement("div");
        n.className = "num";
        n.textContent = num;
        cell.appendChild(n);
      }

      const input = document.createElement("input");
      input.maxLength = 1;
      input.autocomplete = "off";
      input.inputMode = "text";
      input.dataset.r = r;
      input.dataset.c = c;

      input.addEventListener("input", (e) => {
        const v = (e.target.value || "").toUpperCase();
        e.target.value = v.replace(/[^A-Z]/g,"").slice(0,1);
        cwValidateAll();
        if(e.target.value) cwFocusNext(r,c);
      });

      input.addEventListener("keydown", (e) => {
        if(e.key === "Backspace" && !e.target.value) cwFocusPrev(r,c);
      });

      input.addEventListener("focus", () => cwHighlightActive(r,c));

      cell.appendChild(input);
      cwGridEl.appendChild(cell);
    }
  }
}

function cwValidateAll(){
  let correctCount = 0;

  for(const w of CW_WORDS){
    const typed = cwReadWord(w);
    const key = `${w.dir}${w.num}`;
    const ok = (typed.length === w.answer.length && typed === w.answer);
    if(ok){ correctCount++; cwFound.add(key); } else { cwFound.delete(key); }
    cwSetWordCorrect(w, ok);
  }

  cwProgressEl.textContent = `${correctCount} / ${CW_TOTAL} parole corrette`;

  if(correctCount === CW_TOTAL){
    const done = getGamesDone();
    if(!done.game1){
      unlockLetters(["C"]);
      setGameDone("game1");
    }
    const unlockedNow = getUnlocked().length;
    cwBanner.textContent = `✅ Completato! Hai sbloccato ${unlockedNow} lettere.`;
    cwBanner.className = "msg ok";
    renderAnagram();
  }else{
    if(cwBanner.classList.contains("ok")){
      cwBanner.textContent = "";
      cwBanner.className = "msg";
    }
  }
}

document.getElementById("cwClearBtn").addEventListener("click", () => {
  document.querySelectorAll("#cwGrid input").forEach(i => i.value = "");
  cwBanner.textContent = "";
  cwBanner.className = "msg";
  cwValidateAll();
});

document.getElementById("cwCheckBtn").addEventListener("click", () => {
  cwValidateAll();
  if(cwFound.size !== CW_TOTAL){
    cwBanner.textContent = "Non ancora: ci sono parole incomplete o errate.";
    cwBanner.className = "msg bad";
  }
});

/* =========================================================
   GAME 2: CIPHER (reward unlock "A")
========================================================= */
const cipherAnswerEl = document.getElementById("cipherAnswer");
const cipherMsgEl = document.getElementById("cipherMsg");
const CIPHER_EXPECTED = "L'AMOR CHE MUOVE IL SOLE E LE ALTRE STELLE";

function normalizeCipherInput(s){
  return String(s || "")
    .toUpperCase()
    .replace(/\s+/g, " ")
    .trim();
}

document.getElementById("cipherClearBtn").addEventListener("click", () => {
  cipherAnswerEl.value = "";
  cipherMsgEl.textContent = "";
  cipherMsgEl.className = "msg";
});

document.getElementById("cipherCheckBtn").addEventListener("click", () => {
  const typed = normalizeCipherInput(cipherAnswerEl.value);
  const expected = normalizeCipherInput(CIPHER_EXPECTED);

  if(typed === expected){
    const done = getGamesDone();
    if(!done.game2){
      unlockLetters(["A"]);
      setGameDone("game2");
    }
    const unlockedNow = getUnlocked().length;
    cipherMsgEl.textContent = `✅ Corretto! Hai sbloccato ${unlockedNow} lettere.`;
    cipherMsgEl.className = "msg ok";
    renderAnagram();
  }else{
    cipherMsgEl.textContent = "❌ Non è corretto.";
    cipherMsgEl.className = "msg bad";
  }
});

/* =========================================================
   GAME 3: LOGIC DEDUCTION (reward unlock "R")
========================================================= */
const OBJECTS = ["LIBRO","CHIAVE","OCCHIALI"];
const COLORS  = ["ROSSO","VERDE","BLU"];

const logicWarn = document.getElementById("logicWarn");
const logicMsg = document.getElementById("logicMsg");

const selects = {
  annaObj: document.getElementById("annaObj"),
  brunoObj: document.getElementById("brunoObj"),
  carloObj: document.getElementById("carloObj"),
  annaCol: document.getElementById("annaCol"),
  brunoCol: document.getElementById("brunoCol"),
  carloCol: document.getElementById("carloCol")
};

function fillSelect(sel, items){
  sel.innerHTML = "";
  const opt0 = document.createElement("option");
  opt0.value = "";
  opt0.textContent = "— seleziona —";
  sel.appendChild(opt0);

  for(const it of items){
    const o = document.createElement("option");
    o.value = it;
    o.textContent = it;
    sel.appendChild(o);
  }
}

function initLogicUI(){
  fillSelect(selects.annaObj, OBJECTS);
  fillSelect(selects.brunoObj, OBJECTS);
  fillSelect(selects.carloObj, OBJECTS);
  fillSelect(selects.annaCol, COLORS);
  fillSelect(selects.brunoCol, COLORS);
  fillSelect(selects.carloCol, COLORS);

  for(const k in selects){
    selects[k].addEventListener("change", () => {
      logicMsg.textContent = "";
      logicMsg.className = "msg";
      checkUniquenessWarn();
    });
  }
}

function checkUniquenessWarn(){
  const objs = [selects.annaObj.value, selects.brunoObj.value, selects.carloObj.value].filter(Boolean);
  const cols = [selects.annaCol.value, selects.brunoCol.value, selects.carloCol.value].filter(Boolean);

  const objDup = (new Set(objs)).size !== objs.length;
  const colDup = (new Set(cols)).size !== cols.length;

  logicWarn.style.display = (objDup || colDup) ? "block" : "none";
}

function resetLogic(){
  for(const k in selects) selects[k].value = "";
  logicWarn.style.display = "none";
  logicMsg.textContent = "";
  logicMsg.className = "msg";
}

function isLogicComplete(){
  for(const k in selects){
    if(!selects[k].value) return false;
  }
  return true;
}

function logicIsUnique(){
  const objs = [selects.annaObj.value, selects.brunoObj.value, selects.carloObj.value];
  const cols = [selects.annaCol.value, selects.brunoCol.value, selects.carloCol.value];
  return (new Set(objs)).size === 3 && (new Set(cols)).size === 3;
}

function checkLogicSolution(){
  if(!isLogicComplete()){
    logicMsg.textContent = "Completa tutte le selezioni prima di controllare.";
    logicMsg.className = "msg bad";
    return;
  }
  if(!logicIsUnique()){
    logicMsg.textContent = "Ogni oggetto e ogni colore deve essere usato una sola volta.";
    logicMsg.className = "msg bad";
    return;
  }

  const ok =
    selects.annaObj.value === "LIBRO"      && selects.annaCol.value === "ROSSO" &&
    selects.brunoObj.value === "CHIAVE"   && selects.brunoCol.value === "VERDE" &&
    selects.carloObj.value === "OCCHIALI" && selects.carloCol.value === "BLU";

  if(ok){
    const done = getGamesDone();
    if(!done.game3){
      unlockLetters(["R"]);
      setGameDone("game3");
    }
    const unlockedNow = getUnlocked().length;
    logicMsg.textContent = `✅ Corretto! Hai sbloccato ${unlockedNow} lettere.`;
    logicMsg.className = "msg ok";
    renderAnagram();
  }else{
    logicMsg.textContent = "❌ Non è corretto.";
    logicMsg.className = "msg bad";
  }
}

document.getElementById("logicClearBtn").addEventListener("click", resetLogic);
document.getElementById("logicCheckBtn").addEventListener("click", checkLogicSolution);

/* =========================================================
   INIT
========================================================= */
function init(){
  // anagram
  loadAnagram();
  updateUnlockedChip();
  renderAnagram();

  // game1
  cwSetResponsiveCellSize();
  cwBuildClues();
  cwBuildGrid();
  cwValidateAll();

  // game3
  initLogicUI();
  checkUniquenessWarn();

  // show last game (solo step tondi)
  restoreCurrentGame();
}
init();
</script>
