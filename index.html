<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>♥ 30 Anni Bubola ♥</title>

<style>
  :root{
    --gap: 3px;
    --cell: 34px; /* viene reso responsive da JS */
  }

  body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f2f2f2;
    margin:0;
    padding:12px;
  }

  h2{ margin:10px 0 6px; }

  .hint{
    color:#555;
    font-size:13px;
    margin-top:6px;
    margin-bottom:10px;
  }

  #grid{
    display:grid;
    gap: var(--gap);
    justify-content:center;
    margin:14px auto;
    touch-action:none;          /* fondamentale su iPhone: evita scroll/zoom durante drag */
  }

  .cell{
    width: var(--cell);
    height: var(--cell);
    background:#fff;
    border:1px solid #cfcfcf;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size: calc(var(--cell) * 0.55);
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
    border-radius:8px;
    position: relative;         /* serve per disegnare il cerchio */
  }

  /* evidenziazione "preview" durante il drag */
  .cell.preview{
    background:#ffd54f;
  }

  /* celle trovate: niente verde, solo cerchio */
  .cell.found{
    background:#fff;
    color:#111;
    border-color:#cfcfcf;
  }
  .cell.found::after{
    content:"";
    position:absolute;
    inset: 10%;
    border: 3px solid #2e7d32; /* colore del cerchio */
    border-radius: 999px;
    pointer-events:none;
    box-sizing:border-box;
  }

  /* se una cella è found, non vogliamo che la preview la “sporchi” */
  .cell.found.preview{
    background:#fff;
  }

  .word-list{
    max-width:680px;
    margin:0 auto;
    line-height: 1.9;
  }

  .word{
    display:inline-block;
    margin:6px 10px;
    font-weight:800;
    letter-spacing:0.4px;
  }

  .word.found{
    text-decoration:line-through;
    color:#777;
  }

  .bar{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
    margin: 6px 0 2px;
  }

  .chip{
    background:#fff;
    padding:6px 10px;
    border:1px solid #ddd;
    border-radius:999px;
    font-size:13px;
    font-weight:800;
    color:#333;
  }
</style>
</head>

<body>
  <h2>Trova tutte le parole!</h2>
  <div class="hint">Trascina per selezionare (↔ ↕ ↘ ↗). Rilascia per confermare.</div>

  <div class="bar">
    <div class="chip" id="progress">0 / 37</div>
  </div>

  <div id="grid"></div>
  <div class="word-list" id="wordList"></div>

<script>
/* =========================
   PUZZLE HARDCODED
========================= */
const gridData = [
  ["E","A","A","S","U","A","C","A","P","O","O","A"],
  ["D","R","I","D","E","R","E","C","T","E","D","R"],
  ["N","D","E","C","L","E","I","T","A","N","N","M"],
  ["A","O","A","G","E","S","E","A","P","F","O","A"],
  ["R","P","S","T","N","R","P","U","R","O","F","R"],
  ["G","O","B","U","I","O","N","A","M","U","B","E"],
  ["S","N","A","D","N","A","M","O","D","E","A","I"],
  ["O","U","O","N","N","A","T","I","R","E","V","P"],
  ["A","P","D","I","P","G","B","E","L","L","O","S"],
  ["I","R","R","R","I","V","E","L","A","R","E","E"],
  ["Z","D","I","O","U","O","M","O","U","N","O","D"],
  ["A","E","N","A","C","C","E","T","T","A","R","E"]
];

const words = [
  "VERITA","LEI","PACE","CORPO","PAURA","DIRETTO","GRANDE","USO",
  "ACCETTARE","DOMANDA","PIU","DIO","CAUSA","BELLO","REGNO",
  "CAFFE","RIVELARE","ARMARE","UOMO","NOI","FONDO","SEDE",
  "UMANO","SUD","CAPO","PURO","ARIA","RIDERE","PENA","DOPO",
  "PAESE","BUIO","BERE","ANNO","ZIA","DON","CANE"
];

const wordSet = new Set(words);

/* =========================
   RESPONSIVE CELL SIZE
========================= */
const GRID_SIZE = gridData.length;

function setResponsiveCellSize(){
  const padding = 24;                       // margine totale stimato
  const maxWidth = Math.min(window.innerWidth, 520) - padding;
  const gap = 3;

  const cell = Math.floor((maxWidth - gap*(GRID_SIZE-1)) / GRID_SIZE);
  const clamped = Math.max(26, Math.min(cell, 46));  // min/max (tweak se vuoi)

  document.documentElement.style.setProperty("--cell", clamped + "px");
  document.documentElement.style.setProperty("--gap", gap + "px");

  const gridEl = document.getElementById("grid");
  gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, var(--cell))`;
}

window.addEventListener("resize", setResponsiveCellSize);

/* =========================
   BUILD UI
========================= */
const gridEl = document.getElementById("grid");
const wordListEl = document.getElementById("wordList");
const progressEl = document.getElementById("progress");

function buildGrid(){
  gridEl.innerHTML = "";
  for(let r=0;r<GRID_SIZE;r++){
    for(let c=0;c<GRID_SIZE;c++){
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = gridData[r][c];
      cell.dataset.row = r;
      cell.dataset.col = c;
      gridEl.appendChild(cell);
    }
  }
}

function buildWordList(){
  wordListEl.innerHTML = "";
  for(const w of words){
    const span = document.createElement("span");
    span.className = "word";
    span.id = "word-" + w;
    span.textContent = w;
    wordListEl.appendChild(span);
  }
}

/* =========================
   DRAG SELECTION (iPhone friendly)
   - pointer events
   - snap to 8 directions
========================= */
let isDragging = false;
let activePointerId = null;

let startPos = null;       // {r,c}
let currentPos = null;     // {r,c}
let previewCells = [];     // [{r,c},...]
let lockedDir = null;      // {dr,dc} direction after first meaningful move

const foundWords = new Set();

function updateProgress(){
  progressEl.textContent = `${foundWords.size} / ${words.length}`;
}

function getCellFromPoint(x, y){
  const el = document.elementFromPoint(x, y);
  if(!el || !el.classList.contains("cell")) return null;
  return el;
}

function parseCell(el){
  return { r: parseInt(el.dataset.row, 10), c: parseInt(el.dataset.col, 10) };
}

function clearPreview(){
  document.querySelectorAll(".cell.preview").forEach(el => el.classList.remove("preview"));
  previewCells = [];
}

function applyPreview(cells){
  clearPreview();
  previewCells = cells;
  for(const p of cells){
    const el = document.querySelector(`.cell[data-row='${p.r}'][data-col='${p.c}']`);
    if(el && !el.classList.contains("found")) el.classList.add("preview");
  }
}

function snapDirection(dr, dc){
  if(dr === 0 && dc === 0) return null;

  const adr = Math.abs(dr);
  const adc = Math.abs(dc);

  if(adr === 0) return {dr: 0, dc: Math.sign(dc)};
  if(adc === 0) return {dr: Math.sign(dr), dc: 0};

  // se quasi diagonale -> diagonale
  if(Math.abs(adr - adc) <= 1){
    return {dr: Math.sign(dr), dc: Math.sign(dc)};
  }

  // altrimenti asse dominante
  if(adr > adc) return {dr: Math.sign(dr), dc: 0};
  return {dr: 0, dc: Math.sign(dc)};
}

function buildLineCells(start, end, dir){
  const cells = [];
  const steps = Math.max(Math.abs(end.r - start.r), Math.abs(end.c - start.c));
  let r = start.r, c = start.c;

  for(let i=0;i<=steps;i++){
    if(r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) break;
    cells.push({r,c});
    r += dir.dr;
    c += dir.dc;
  }
  return cells;
}

function wordFromCells(cells){
  let s = "";
  for(const p of cells) s += gridData[p.r][p.c];
  return s;
}

function markFound(word, cells){
  foundWords.add(word);

  const wEl = document.getElementById("word-" + word);
  if(wEl) wEl.classList.add("found");

  for(const p of cells){
    const el = document.querySelector(`.cell[data-row='${p.r}'][data-col='${p.c}']`);
    if(el){
      el.classList.remove("preview");
      el.classList.add("found");
    }
  }

  updateProgress();

  if(foundWords.size === words.length){
    setTimeout(() => alert("Hai trovato tutte le parole!"), 150);
  }
}

function finishSelection(){
  if(!isDragging) return;
  isDragging = false;

  if(previewCells.length <= 1){
    clearPreview();
    startPos = null; currentPos = null; lockedDir = null;
    return;
  }

  const w = wordFromCells(previewCells);
  const rev = w.split("").reverse().join("");

  if(wordSet.has(w) && !foundWords.has(w)){
    markFound(w, previewCells);
  } else if(wordSet.has(rev) && !foundWords.has(rev)){
    markFound(rev, previewCells);
  } else {
    clearPreview();
  }

  startPos = null; currentPos = null; lockedDir = null;
}

gridEl.addEventListener("pointerdown", (e) => {
  const cellEl = getCellFromPoint(e.clientX, e.clientY);
  if(!cellEl) return;

  e.preventDefault();
  gridEl.setPointerCapture(e.pointerId);

  isDragging = true;
  activePointerId = e.pointerId;
  lockedDir = null;

  startPos = parseCell(cellEl);
  currentPos = {...startPos};
  applyPreview([startPos]);
});

gridEl.addEventListener("pointermove", (e) => {
  if(!isDragging || e.pointerId !== activePointerId) return;

  const cellEl = getCellFromPoint(e.clientX, e.clientY);
  if(!cellEl) return;

  const pos = parseCell(cellEl);
  if(currentPos && pos.r === currentPos.r && pos.c === currentPos.c) return;
  currentPos = pos;

  const drRaw = currentPos.r - startPos.r;
  const dcRaw = currentPos.c - startPos.c;

  if(!lockedDir){
    const dir = snapDirection(drRaw, dcRaw);
    if(!dir) return;
    lockedDir = dir;
  }

  const cells = buildLineCells(startPos, currentPos, lockedDir);
  applyPreview(cells);
});

gridEl.addEventListener("pointerup", (e) => {
  if(e.pointerId !== activePointerId) return;
  e.preventDefault();
  finishSelection();
});

gridEl.addEventListener("pointercancel", (e) => {
  if(e.pointerId !== activePointerId) return;
  finishSelection();
});

/* =========================
   INIT
========================= */
setResponsiveCellSize();
buildGrid();
buildWordList();
updateProgress();
</script>
</body>
</html>
