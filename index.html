<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>♥ 30 Anni Bubola ♥</title>

<style>
  :root{
    --gap: 3px;
    --cell: 34px; /* responsive via JS */
  }

  body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f2f2f2;
    margin:0;
    padding:12px;
  }

  h2{ margin:10px 0 6px; }

  .hint{
    color:#555;
    font-size:13px;
    margin:6px 0 10px;
  }

  .bar{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
    margin: 6px 0 2px;
  }
  .chip{
    background:#fff;
    padding:6px 10px;
    border:1px solid #ddd;
    border-radius:999px;
    font-size:13px;
    font-weight:800;
    color:#333;
  }

  /* Container relativo per griglia + overlay */
  #gridWrap{
    position: relative;
    display: inline-block;
    margin: 14px auto;
    touch-action:none; /* fondamentale iPhone */
  }

  #grid{
    display:grid;
    gap: var(--gap);
    justify-content:center;
    touch-action:none;
  }

  .cell{
    width: var(--cell);
    height: var(--cell);
    background:#fff;
    border:1px solid #cfcfcf;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size: calc(var(--cell) * 0.55);
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }

  /* Overlay SVG sopra la griglia */
  #overlay{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  .word-list{
    max-width:680px;
    margin:0 auto;
    line-height: 1.9;
  }
  .word{
    display:inline-block;
    margin:6px 10px;
    font-weight:800;
    letter-spacing:0.4px;
  }
  .word.found{
    text-decoration:line-through;
    color:#777;
  }
</style>
</head>

<body>
  <h2>Trova tutte le parole!</h2>
  <div class="hint">Trascina per selezionare (↔ ↕ ↘ ↗). Rilascia per confermare.</div>

  <div class="bar">
    <div class="chip" id="progress">0 / 37</div>
  </div>

  <div id="gridWrap">
    <div id="grid"></div>
    <svg id="overlay"></svg>
  </div>

  <div class="word-list" id="wordList"></div>

<script>
/* =========================
   PUZZLE HARDCODED
========================= */
const gridData = [
  ["E","A","A","S","U","A","C","A","P","O","O","A"],
  ["D","R","I","D","E","R","E","C","T","E","D","R"],
  ["N","D","E","C","L","E","I","T","A","N","N","M"],
  ["A","O","A","G","E","S","E","A","P","F","O","A"],
  ["R","P","S","T","N","R","P","U","R","O","F","R"],
  ["G","O","B","U","I","O","N","A","M","U","B","E"],
  ["S","N","A","D","N","A","M","O","D","E","A","I"],
  ["O","U","O","N","N","A","T","I","R","E","V","P"],
  ["A","P","D","I","P","G","B","E","L","L","O","S"],
  ["I","R","R","R","I","V","E","L","A","R","E","E"],
  ["Z","D","I","O","U","O","M","O","U","N","O","D"],
  ["A","E","N","A","C","C","E","T","T","A","R","E"]
];

const words = [
  "VERITA","LEI","PACE","CORPO","PAURA","DIRETTO","GRANDE","USO",
  "ACCETTARE","DOMANDA","PIU","DIO","CAUSA","BELLO","REGNO",
  "CAFFE","RIVELARE","ARMARE","UOMO","NOI","FONDO","SEDE",
  "UMANO","SUD","CAPO","PURO","ARIA","RIDERE","PENA","DOPO",
  "PAESE","BUIO","BERE","ANNO","ZIA","DON","CANE"
];

const wordSet = new Set(words);
const GRID_SIZE = gridData.length;

/* =========================
   DOM
========================= */
const gridWrapEl = document.getElementById("gridWrap");
const gridEl = document.getElementById("grid");
const overlayEl = document.getElementById("overlay");
const wordListEl = document.getElementById("wordList");
const progressEl = document.getElementById("progress");

/* =========================
   RESPONSIVE SIZE
========================= */
function setResponsiveCellSize(){
  const padding = 24;
  const maxWidth = Math.min(window.innerWidth, 520) - padding;
  const gap = 3;

  const cell = Math.floor((maxWidth - gap*(GRID_SIZE-1)) / GRID_SIZE);
  const clamped = Math.max(26, Math.min(cell, 46));

  document.documentElement.style.setProperty("--cell", clamped + "px");
  document.documentElement.style.setProperty("--gap", gap + "px");

  gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, var(--cell))`;

  // aggiorna dimensioni SVG overlay (viewBox in px reali)
  syncOverlaySize();
  redrawFoundLines();
}
window.addEventListener("resize", setResponsiveCellSize);

/* =========================
   BUILD UI
========================= */
function buildGrid(){
  gridEl.innerHTML = "";
  for(let r=0;r<GRID_SIZE;r++){
    for(let c=0;c<GRID_SIZE;c++){
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = gridData[r][c];
      cell.dataset.row = r;
      cell.dataset.col = c;
      gridEl.appendChild(cell);
    }
  }
}

function buildWordList(){
  wordListEl.innerHTML = "";
  for(const w of words){
    const span = document.createElement("span");
    span.className = "word";
    span.id = "word-" + w;
    span.textContent = w;
    wordListEl.appendChild(span);
  }
}

/* =========================
   OVERLAY SVG HELPERS
========================= */
function syncOverlaySize(){
  const rect = gridEl.getBoundingClientRect();
  overlayEl.setAttribute("width", rect.width);
  overlayEl.setAttribute("height", rect.height);
  overlayEl.setAttribute("viewBox", `0 0 ${rect.width} ${rect.height}`);
}

function cellCenterPx(r, c){
  // coordinate relative alla griglia
  const cell = document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
  const gridRect = gridEl.getBoundingClientRect();
  const rect = cell.getBoundingClientRect();

  const x = (rect.left - gridRect.left) + rect.width/2;
  const y = (rect.top  - gridRect.top ) + rect.height/2;
  return {x, y};
}

function makeLine(x1,y1,x2,y2, opts={}){
  const ns = "http://www.w3.org/2000/svg";
  const line = document.createElementNS(ns, "line");
  line.setAttribute("x1", x1);
  line.setAttribute("y1", y1);
  line.setAttribute("x2", x2);
  line.setAttribute("y2", y2);

  // stile “cerchiatura unica” tipo foto (contorno)
  line.setAttribute("fill", "none");
  line.setAttribute("stroke", opts.stroke ?? "#f5b301"); // giallo contorno
  line.setAttribute("stroke-width", opts.width ?? "10");
  line.setAttribute("stroke-linecap", "round");
  line.setAttribute("stroke-linejoin", "round");
  line.setAttribute("opacity", opts.opacity ?? "0.85");

  // se vuoi SOLO contorno e non “evidenziatore pieno”:
  // usa width più basso (6-8) e opacity più bassa (0.7)
  return line;
}

/* =========================
   GAME STATE
========================= */
let isDragging = false;
let activePointerId = null;
let startPos = null;
let currentPos = null;
let lockedDir = null;

// preview line (solo una, mentre trascini)
let previewSvgLine = null;

// linee trovate persistenti: salviamo endpoints in coordinate griglia
// così su resize le ridisegniamo correttamente
const foundLineDefs = []; // {word, start:{r,c}, end:{r,c}}

const foundWords = new Set();

function updateProgress(){
  progressEl.textContent = `${foundWords.size} / ${words.length}`;
}

function getCellFromPoint(x, y){
  const el = document.elementFromPoint(x, y);
  if(!el || !el.classList.contains("cell")) return null;
  return el;
}

function parseCell(el){
  return { r: parseInt(el.dataset.row, 10), c: parseInt(el.dataset.col, 10) };
}

function snapDirection(dr, dc){
  if(dr === 0 && dc === 0) return null;

  const adr = Math.abs(dr);
  const adc = Math.abs(dc);

  if(adr === 0) return {dr: 0, dc: Math.sign(dc)};
  if(adc === 0) return {dr: Math.sign(dr), dc: 0};

  if(Math.abs(adr - adc) <= 1){
    return {dr: Math.sign(dr), dc: Math.sign(dc)};
  }

  if(adr > adc) return {dr: Math.sign(dr), dc: 0};
  return {dr: 0, dc: Math.sign(dc)};
}

function buildLineCells(start, end, dir){
  const cells = [];
  const steps = Math.max(Math.abs(end.r - start.r), Math.abs(end.c - start.c));
  let r = start.r, c = start.c;

  for(let i=0;i<=steps;i++){
    if(r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) break;
    cells.push({r,c});
    r += dir.dr;
    c += dir.dc;
  }
  return cells;
}

function wordFromCells(cells){
  let s = "";
  for(const p of cells) s += gridData[p.r][p.c];
  return s;
}

/* =========================
   PREVIEW LINE DRAW
========================= */
function clearPreviewLine(){
  if(previewSvgLine){
    previewSvgLine.remove();
    previewSvgLine = null;
  }
}

function drawPreviewLine(startRC, endRC){
  clearPreviewLine();

  const a = cellCenterPx(startRC.r, startRC.c);
  const b = cellCenterPx(endRC.r, endRC.c);

  previewSvgLine = makeLine(a.x, a.y, b.x, b.y, {
    stroke: "#9e9e9e",
    width: "8",
    opacity: "0.65"
  });
  overlayEl.appendChild(previewSvgLine);
}

/* =========================
   FOUND LINES DRAW
========================= */
function addFoundLine(word, startRC, endRC){
  foundLineDefs.push({word, start: startRC, end: endRC});
  redrawFoundLines();
}

function redrawFoundLines(){
  // rimuovi tutte le linee persistenti (tenendo la preview separata)
  // soluzione semplice: svuoto overlay e poi ridisegno
  const keepPreview = previewSvgLine;
  overlayEl.innerHTML = "";
  previewSvgLine = null;

  for(const def of foundLineDefs){
    const a = cellCenterPx(def.start.r, def.start.c);
    const b = cellCenterPx(def.end.r, def.end.c);

    const line = makeLine(a.x, a.y, b.x, b.y, {
      stroke: "#f5b301",
      width: "10",
      opacity: "0.85"
    });
    overlayEl.appendChild(line);
  }

  // ripristina preview se esisteva
  if(keepPreview){
    // non possiamo riusare l'elemento (era rimosso), la ridisegniamo se abbiamo start/current
    if(startPos && currentPos){
      drawPreviewLine(startPos, currentPos);
    }
  }
}

function markFound(word, cells){
  foundWords.add(word);

  const wEl = document.getElementById("word-" + word);
  if(wEl) wEl.classList.add("found");

  // endpoints della selezione (prima e ultima cella della linea)
  const startRC = cells[0];
  const endRC   = cells[cells.length - 1];

  addFoundLine(word, startRC, endRC);

  updateProgress();

  if(foundWords.size === words.length){
    setTimeout(() => alert("Hai trovato tutte le parole!"), 150);
  }
}

/* =========================
   POINTER EVENTS
========================= */
gridWrapEl.addEventListener("pointerdown", (e) => {
  const cellEl = getCellFromPoint(e.clientX, e.clientY);
  if(!cellEl) return;

  e.preventDefault();
  gridWrapEl.setPointerCapture(e.pointerId);

  isDragging = true;
  activePointerId = e.pointerId;
  lockedDir = null;

  startPos = parseCell(cellEl);
  currentPos = {...startPos};

  // preview iniziale (linea di lunghezza 0 non la disegniamo)
  clearPreviewLine();
});

gridWrapEl.addEventListener("pointermove", (e) => {
  if(!isDragging || e.pointerId !== activePointerId) return;

  const cellEl = getCellFromPoint(e.clientX, e.clientY);
  if(!cellEl) return;

  const pos = parseCell(cellEl);
  if(currentPos && pos.r === currentPos.r && pos.c === currentPos.c) return;
  currentPos = pos;

  const drRaw = currentPos.r - startPos.r;
  const dcRaw = currentPos.c - startPos.c;

  if(!lockedDir){
    const dir = snapDirection(drRaw, dcRaw);
    if(!dir) return;
    lockedDir = dir;
  }

  const cells = buildLineCells(startPos, currentPos, lockedDir);
  if(cells.length >= 2){
    // disegna preview dal primo all'ultimo della linea “snappata”
    drawPreviewLine(cells[0], cells[cells.length - 1]);
  } else {
    clearPreviewLine();
  }
});

function finishSelection(){
  if(!isDragging) return;
  isDragging = false;

  if(!startPos || !currentPos || !lockedDir){
    clearPreviewLine();
    startPos = null; currentPos = null; lockedDir = null;
    return;
  }

  const cells = buildLineCells(startPos, currentPos, lockedDir);
  clearPreviewLine();

  if(cells.length <= 1){
    startPos = null; currentPos = null; lockedDir = null;
    return;
  }

  const w = wordFromCells(cells);
  const rev = w.split("").reverse().join("");

  if(wordSet.has(w) && !foundWords.has(w)){
    markFound(w, cells);
  } else if(wordSet.has(rev) && !foundWords.has(rev)){
    markFound(rev, cells);
  }

  startPos = null; currentPos = null; lockedDir = null;
}

gridWrapEl.addEventListener("pointerup", (e) => {
  if(e.pointerId !== activePointerId) return;
  e.preventDefault();
  finishSelection();
});

gridWrapEl.addEventListener("pointercancel", (e) => {
  if(e.pointerId !== activePointerId) return;
  finishSelection();
});

/* =========================
   INIT
========================= */
buildGrid();
buildWordList();
updateProgress();
setResponsiveCellSize();
syncOverlaySize();
</script>
</body>
</html>
