<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>♥ 30 Anni Bubola ♥</title>

<style>
  :root{
    --gap: 3px;
    --cell: 34px; /* responsive via JS */
  }

  body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f2f2f2;
    margin:0;
    padding:12px;
  }

  h2{ margin:10px 0 6px; }

  .hint{
    color:#555;
    font-size:13px;
    margin:6px 0 10px;
  }

  .bar{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
    margin: 6px 0 2px;
  }
  .chip{
    background:#fff;
    padding:6px 10px;
    border:1px solid #ddd;
    border-radius:999px;
    font-size:13px;
    font-weight:800;
    color:#333;
  }

  /* wrapper relativo per griglia + overlay */
  #gridWrap{
    position: relative;
    display: inline-block;
    margin: 14px auto;
    touch-action:none; /* iPhone: evita scroll/zoom durante drag */
  }

  #grid{
    display:grid;
    gap: var(--gap);
    justify-content:center;
    touch-action:none;
  }

  .cell{
    width: var(--cell);
    height: var(--cell);
    background:#fff;
    border:1px solid #cfcfcf;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size: calc(var(--cell) * 0.55);
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }

  /* overlay sopra la griglia */
  #overlay{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  .word-list{
    max-width:680px;
    margin:0 auto;
    line-height: 1.9;
  }

  .word{
    display:inline-block;
    margin:6px 10px;
    font-weight:800;
    letter-spacing:0.4px;
  }

  .word.found{
    text-decoration:line-through;
    color:#777;
  }
</style>
</head>

<body>
  <h2>Trova tutte le parole!</h2>
  <div class="hint">Trascina per selezionare (↔ ↕ ↘ ↗). Rilascia per confermare.</div>

  <div class="bar">
    <div class="chip" id="progress">0 / 37</div>
  </div>

  <div id="gridWrap">
    <div id="grid"></div>
    <svg id="overlay"></svg>
  </div>

  <div class="word-list" id="wordList"></div>

<script>
/* =========================
   PUZZLE HARDCODED
========================= */
const gridData = [
  ["E","A","A","S","U","A","C","A","P","O","O","A"],
  ["D","R","I","D","E","R","E","C","T","E","D","R"],
  ["N","D","E","C","L","E","I","T","A","N","N","M"],
  ["A","O","A","G","E","S","E","A","P","F","O","A"],
  ["R","P","S","T","N","R","P","U","R","O","F","R"],
  ["G","O","B","U","I","O","N","A","M","U","B","E"],
  ["S","N","A","D","N","A","M","O","D","E","A","I"],
  ["O","U","O","N","N","A","T","I","R","E","V","P"],
  ["A","P","D","I","P","G","B","E","L","L","O","S"],
  ["I","R","R","R","I","V","E","L","A","R","E","E"],
  ["Z","D","I","O","U","O","M","O","U","N","O","D"],
  ["A","E","N","A","C","C","E","T","T","A","R","E"]
];

const words = [
  "VERITA","LEI","PACE","CORPO","PAURA","DIRETTO","GRANDE","USO",
  "ACCETTARE","DOMANDA","PIU","DIO","CAUSA","BELLO","REGNO",
  "CAFFE","RIVELARE","ARMARE","UOMO","NOI","FONDO","SEDE",
  "UMANO","SUD","CAPO","PURO","ARIA","RIDERE","PENA","DOPO",
  "PAESE","BUIO","BERE","ANNO","ZIA","DON","CANE"
];

const wordSet = new Set(words);
const GRID_SIZE = gridData.length;

/* =========================
   DOM
========================= */
const gridWrapEl = document.getElementById("gridWrap");
const gridEl = document.getElementById("grid");
const overlayEl = document.getElementById("overlay");
const wordListEl = document.getElementById("wordList");
const progressEl = document.getElementById("progress");

/* =========================
   RESPONSIVE SIZE
========================= */
function setResponsiveCellSize(){
  const padding = 24;
  const maxWidth = Math.min(window.innerWidth, 520) - padding;
  const gap = 3;

  const cell = Math.floor((maxWidth - gap*(GRID_SIZE-1)) / GRID_SIZE);
  const clamped = Math.max(26, Math.min(cell, 50));

  document.documentElement.style.setProperty("--cell", clamped + "px");
  document.documentElement.style.setProperty("--gap", gap + "px");

  gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, var(--cell))`;

  syncOverlaySize();
  redrawFoundCapsules();
}

window.addEventListener("resize", setResponsiveCellSize);

function getCellSizePx(){
  const v = getComputedStyle(document.documentElement).getPropertyValue("--cell").trim();
  return parseFloat(v.replace("px","")) || 34;
}

/* =========================
   BUILD UI
========================= */
function buildGrid(){
  gridEl.innerHTML = "";
  for(let r=0;r<GRID_SIZE;r++){
    for(let c=0;c<GRID_SIZE;c++){
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = gridData[r][c];
      cell.dataset.row = r;
      cell.dataset.col = c;
      gridEl.appendChild(cell);
    }
  }
}

function buildWordList(){
  wordListEl.innerHTML = "";
  for(const w of words){
    const span = document.createElement("span");
    span.className = "word";
    span.id = "word-" + w;
    span.textContent = w;
    wordListEl.appendChild(span);
  }
}

function updateProgress(){
  progressEl.textContent = `${foundWords.size} / ${words.length}`;
}

/* =========================
   OVERLAY HELPERS
========================= */
function syncOverlaySize(){
  const rect = gridEl.getBoundingClientRect();
  overlayEl.setAttribute("width", rect.width);
  overlayEl.setAttribute("height", rect.height);
  overlayEl.setAttribute("viewBox", `0 0 ${rect.width} ${rect.height}`);
}

function cellCenterPx(r, c){
  const cell = document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
  const gridRect = gridEl.getBoundingClientRect();
  const rect = cell.getBoundingClientRect();
  const x = (rect.left - gridRect.left) + rect.width/2;
  const y = (rect.top  - gridRect.top ) + rect.height/2;
  return {x, y};
}

/* =========================
   CAPSULE (solo contorno)
========================= */
function makeCapsuleOutline(x1, y1, x2, y2, cellPx, opts = {}) {
  const ns = "http://www.w3.org/2000/svg";

  const dx = x2 - x1;
  const dy = y2 - y1;

  const dist = Math.hypot(dx, dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  // altezza capsula in funzione della cella (regola qui)
  const h = (opts.heightFactor ?? 0.78) * cellPx;

  // padding extra in lunghezza (regola qui)
  const pad = (opts.lengthPadFactor ?? 0.45) * cellPx;

  const w = dist + pad;

  const cx = (x1 + x2) / 2;
  const cy = (y1 + y2) / 2;

  const rect = document.createElementNS(ns, "rect");
  rect.setAttribute("x", -w / 2);
  rect.setAttribute("y", -h / 2);
  rect.setAttribute("width", w);
  rect.setAttribute("height", h);
  rect.setAttribute("rx", h / 2);
  rect.setAttribute("ry", h / 2);

  // SOLO CONTORNO
  rect.setAttribute("fill", "transparent");
  rect.setAttribute("stroke", opts.stroke ?? "#f5b301");
  rect.setAttribute("stroke-width", opts.strokeWidth ?? Math.max(3, Math.round(cellPx * 0.12)));
  rect.setAttribute("opacity", opts.opacity ?? "0.95");

  rect.setAttribute("pointer-events", "none");
  rect.setAttribute("transform", `translate(${cx} ${cy}) rotate(${angle})`);

  return rect;
}

/* =========================
   GAME STATE
========================= */
let isDragging = false;
let activePointerId = null;
let startPos = null;
let currentPos = null;
let lockedDir = null;

let previewShape = null; // rect preview

const foundWords = new Set();
const foundCapsules = []; // { word, start:{r,c}, end:{r,c} }

function getCellFromPoint(x, y){
  const el = document.elementFromPoint(x, y);
  if(!el || !el.classList.contains("cell")) return null;
  return el;
}

function parseCell(el){
  return { r: parseInt(el.dataset.row, 10), c: parseInt(el.dataset.col, 10) };
}

function snapDirection(dr, dc){
  if(dr === 0 && dc === 0) return null;

  const adr = Math.abs(dr);
  const adc = Math.abs(dc);

  if(adr === 0) return {dr: 0, dc: Math.sign(dc)};
  if(adc === 0) return {dr: Math.sign(dr), dc: 0};

  if(Math.abs(adr - adc) <= 1){
    return {dr: Math.sign(dr), dc: Math.sign(dc)};
  }

  if(adr > adc) return {dr: Math.sign(dr), dc: 0};
  return {dr: 0, dc: Math.sign(dc)};
}

function buildLineCells(start, end, dir){
  const cells = [];
  const steps = Math.max(Math.abs(end.r - start.r), Math.abs(end.c - start.c));
  let r = start.r, c = start.c;

  for(let i=0;i<=steps;i++){
    if(r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) break;
    cells.push({r,c});
    r += dir.dr;
    c += dir.dc;
  }
  return cells;
}

function wordFromCells(cells){
  let s = "";
  for(const p of cells) s += gridData[p.r][p.c];
  return s;
}

/* =========================
   PREVIEW CAPSULE
========================= */
function clearPreview(){
  if(previewShape){
    previewShape.remove();
    previewShape = null;
  }
}

function drawPreviewCapsule(startRC, endRC){
  clearPreview();

  const a = cellCenterPx(startRC.r, startRC.c);
  const b = cellCenterPx(endRC.r, endRC.c);
  const cellPx = getCellSizePx();

  previewShape = makeCapsuleOutline(a.x, a.y, b.x, b.y, cellPx, {
    stroke: "#9e9e9e",
    opacity: "0.65",
    heightFactor: 0.78,
    lengthPadFactor: 0.45
  });

  overlayEl.appendChild(previewShape);
}

/* =========================
   FOUND CAPSULES
========================= */
function redrawFoundCapsules(){
  const keepPreview = !!previewShape;

  overlayEl.innerHTML = "";
  previewShape = null;

  const cellPx = getCellSizePx();

  for(const def of foundCapsules){
    const a = cellCenterPx(def.start.r, def.start.c);
    const b = cellCenterPx(def.end.r, def.end.c);

    const cap = makeCapsuleOutline(a.x, a.y, b.x, b.y, cellPx, {
      stroke: "#f5b301",
      opacity: "0.95",
      heightFactor: 0.78,
      lengthPadFactor: 0.45
    });

    overlayEl.appendChild(cap);
  }

  if(keepPreview && startPos && currentPos){
    // ridisegna preview se stavi trascinando durante resize
    drawPreviewCapsule(startPos, currentPos);
  }
}

function markFound(word, cells){
  foundWords.add(word);

  const wEl = document.getElementById("word-" + word);
  if(wEl) wEl.classList.add("found");

  foundCapsules.push({
    word,
    start: cells[0],
    end: cells[cells.length - 1]
  });

  redrawFoundCapsules();
  updateProgress();

  if(foundWords.size === words.length){
    setTimeout(() => alert("Hai trovato tutte le parole!"), 150);
  }
}

/* =========================
   POINTER EVENTS (DRAG)
========================= */
gridWrapEl.addEventListener("pointerdown", (e) => {
  const cellEl = getCellFromPoint(e.clientX, e.clientY);
  if(!cellEl) return;

  e.preventDefault();
  gridWrapEl.setPointerCapture(e.pointerId);

  isDragging = true;
  activePointerId = e.pointerId;
  lockedDir = null;

  startPos = parseCell(cellEl);
  currentPos = {...startPos};

  clearPreview();
});

gridWrapEl.addEventListener("pointermove", (e) => {
  if(!isDragging || e.pointerId !== activePointerId) return;

  const cellEl = getCellFromPoint(e.clientX, e.clientY);
  if(!cellEl) return;

  const pos = parseCell(cellEl);
  if(currentPos && pos.r === currentPos.r && pos.c === currentPos.c) return;
  currentPos = pos;

  const drRaw = currentPos.r - startPos.r;
  const dcRaw = currentPos.c - startPos.c;

  if(!lockedDir){
    const dir = snapDirection(drRaw, dcRaw);
    if(!dir) return;
    lockedDir = dir;
  }

  const cells = buildLineCells(startPos, currentPos, lockedDir);
  if(cells.length >= 2){
    drawPreviewCapsule(cells[0], cells[cells.length - 1]);
  } else {
    clearPreview();
  }
});

function finishSelection(){
  if(!isDragging) return;
  isDragging = false;

  if(!startPos || !currentPos || !lockedDir){
    clearPreview();
    startPos = null; currentPos = null; lockedDir = null;
    return;
  }

  const cells = buildLineCells(startPos, currentPos, lockedDir);
  clearPreview();

  if(cells.length <= 1){
    startPos = null; currentPos = null; lockedDir = null;
    return;
  }

  const w = wordFromCells(cells);
  const rev = w.split("").reverse().join("");

  if(wordSet.has(w) && !foundWords.has(w)){
    markFound(w, cells);
  } else if(wordSet.has(rev) && !foundWords.has(rev)){
    markFound(rev, cells);
  }

  startPos = null; currentPos = null; lockedDir = null;
}

gridWrapEl.addEventListener("pointerup", (e) => {
  if(e.pointerId !== activePointerId) return;
  e.preventDefault();
  finishSelection();
});

gridWrapEl.addEventListener("pointercancel", (e) => {
  if(e.pointerId !== activePointerId) return;
  finishSelection();
});

/* =========================
   INIT
========================= */
buildGrid();
buildWordList();
updateProgress();
setResponsiveCellSize();
syncOverlaySize();
redrawFoundCapsules();
</script>
</body>
</html>
